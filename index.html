<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Alchemy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --border: #2a2a3a;
    --accent: #f7c948;
    --accent2: #e05c5c;
    --accent3: #5ce0a0;
    --accent4: #5ca0e0;
    --text: #e8e8f0;
    --text-dim: #6a6a8a;
    --card-bg: #1a1a28;
    --card-hover: #222236;
    --shadow: #000;
    --pixel: 2px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'VT323', monospace;
    font-size: 18px;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    image-rendering: pixelated;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Header */
  header {
    background: var(--panel);
    border-bottom: var(--pixel) solid var(--accent);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    box-shadow: 0 4px 0 #000;
  }

  header h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    color: var(--accent);
    text-shadow: 2px 2px 0 #8a6800, 4px 4px 0 #4a3800;
    letter-spacing: 1px;
  }

  .header-stats {
    margin-left: auto;
    display: flex;
    gap: 20px;
    font-size: 16px;
  }
  .stat { color: var(--text-dim); }
  .stat span { color: var(--accent3); }

  #flash-msg {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--accent);
    min-width: 160px;
    text-align: center;
    animation: none;
  }
  #flash-msg.flash {
    animation: flashAnim 1.5s ease forwards;
  }
  @keyframes flashAnim {
    0%   { opacity: 1; color: var(--accent3); }
    80%  { opacity: 1; }
    100% { opacity: 0; color: var(--accent); }
  }

  /* Layout */
  .game-area {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Canvas / workspace */
  #workspace {
    flex: 1;
    position: relative;
    overflow: hidden;
    background:
      linear-gradient(rgba(90,90,160,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(90,90,160,0.04) 1px, transparent 1px);
    background-size: 32px 32px;
    background-color: var(--bg);
  }

  /* Floating elements on canvas */
  .canvas-element {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: grab;
    user-select: none;
    z-index: 10;
    transition: filter 0.1s;
  }
  .canvas-element:active { cursor: grabbing; }
  .canvas-element.dragging { z-index: 100; filter: drop-shadow(0 0 8px var(--accent)); }
  .canvas-element.merging { animation: mergeFlash 0.3s ease; }
  @keyframes mergeFlash {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.4); filter: brightness(2); }
    100% { transform: scale(0); opacity: 0; }
  }

  .canvas-element .el-icon {
    width: 48px;
    height: 48px;
    image-rendering: pixelated;
  }
  .canvas-element .el-label {
    font-size: 12px;
    color: var(--text);
    text-shadow: 1px 1px 0 #000, -1px -1px 0 #000;
    text-align: center;
    white-space: nowrap;
    pointer-events: none;
  }

  /* Spawn animation */
  @keyframes spawnPop {
    0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
    70%  { transform: scale(1.2) rotate(3deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .canvas-element.spawning { animation: spawnPop 0.4s cubic-bezier(.36,.07,.19,.97) forwards; }

  /* Sidebar */
  #sidebar {
    width: 220px;
    background: var(--panel);
    border-left: var(--pixel) solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 10px 12px;
    border-bottom: var(--pixel) solid var(--border);
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--text-dim);
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #search-box {
    background: var(--bg);
    border: var(--pixel) solid var(--border);
    color: var(--text);
    font-family: 'VT323', monospace;
    font-size: 16px;
    padding: 4px 8px;
    width: 100%;
    outline: none;
    margin: 8px 0;
  }
  #search-box:focus { border-color: var(--accent); }

  #elements-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    align-content: start;
  }
  #elements-list::-webkit-scrollbar { width: 6px; }
  #elements-list::-webkit-scrollbar-track { background: var(--bg); }
  #elements-list::-webkit-scrollbar-thumb { background: var(--border); }

  .sidebar-item {
    background: var(--card-bg);
    border: var(--pixel) solid var(--border);
    padding: 6px 4px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    transition: background 0.1s, border-color 0.1s;
    user-select: none;
  }
  .sidebar-item:hover {
    background: var(--card-hover);
    border-color: var(--accent);
  }
  .sidebar-item:active { transform: translate(1px,1px); }
  .sidebar-item .el-icon { width: 28px; height: 28px; image-rendering: pixelated; }
  .sidebar-item .el-label { font-size: 11px; text-align: center; line-height: 1.1; }

  .sidebar-item.new-item {
    border-color: var(--accent3);
    animation: newItemGlow 2s ease;
  }
  @keyframes newItemGlow {
    0%,100% { box-shadow: none; }
    30% { box-shadow: 0 0 10px var(--accent3); border-color: var(--accent3); }
  }

  /* Clear button */
  #clear-btn {
    margin: 8px;
    padding: 8px;
    background: transparent;
    border: var(--pixel) solid var(--accent2);
    color: var(--accent2);
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  #clear-btn:hover { background: var(--accent2); color: #fff; }
  #clear-btn:active { transform: translate(1px,1px); }

  /* New element popup */
  #new-element-popup {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--panel);
    border: var(--pixel) solid var(--accent3);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 1000;
    transition: transform 0.3s cubic-bezier(.36,.07,.19,.97);
    box-shadow: 4px 4px 0 #000;
    pointer-events: none;
  }
  #new-element-popup.show { transform: translateX(-50%) translateY(0); }
  #new-element-popup .el-icon { width: 36px; height: 36px; image-rendering: pixelated; }
  #new-element-popup .popup-text { font-family: 'Press Start 2P', monospace; font-size: 9px; line-height: 1.6; }
  #new-element-popup .popup-name { color: var(--accent3); font-size: 11px; }

  /* Category filter */
  #cat-filter {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    padding: 6px;
    border-bottom: var(--pixel) solid var(--border);
  }
  .cat-btn {
    font-family: 'VT323', monospace;
    font-size: 13px;
    padding: 1px 6px;
    border: var(--pixel) solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
  }
  .cat-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(247,201,72,0.1); }
</style>
</head>

// Build fast lookup
const comboMap = {};
for (const [a, b, result] of COMBOS) {
  if (!ELEMENTS[result]) continue; // only if result is a known element
  const key1 = a < b ? `${a}+${b}` : `${b}+${a}`;
  if (!comboMap[key1]) comboMap[key1] = result;
}

// ============================================================
// ICON RENDERER
// ============================================================
function renderIcon(id, size = 16) {
  const iconDef = ICONS[id];
  if (!iconDef) {
    // Fallback: colored square with first letter
    const el = ELEMENTS[id];
    const colors = ['#f7c948','#e05c5c','#5ce0a0','#5ca0e0','#b060e0'];
    const c = colors[(id.charCodeAt(0)) % colors.length];
    return `<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
      <rect width="16" height="16" fill="${c}" opacity="0.3"/>
      <rect x="1" y="1" width="14" height="14" fill="${c}" opacity="0.5"/>
      <text x="8" y="12" text-anchor="middle" font-size="10" font-family="monospace" fill="white">${(el?.name||id)[0].toUpperCase()}</text>
    </svg>`;
  }

  const {colors, rows} = iconDef;
  let rects = '';
  const rowsToUse = rows.slice(0, 12);
  rowsToUse.forEach((row, y) => {
    for (let x = 0; x < 16; x++) {
      const ci = parseInt(row[x] || '0');
      if (ci === 0) continue;
      const color = colors[ci - 1] || '#fff';
      rects += `<rect x="${x}" y="${y}" width="1" height="1" fill="${color}"/>`;
    }
  });

  return `<svg viewBox="0 0 16 12" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">${rects}</svg>`;
}

// ============================================================
// GAME STATE
// ============================================================
const discovered = new Set(['fire','water','earth','air']);
let canvasElements = [];
let elementIdCounter = 0;
let dragging = null;
let dragOffsetX = 0, dragOffsetY = 0;
let activeCategory = 'all';
let searchQuery = '';
let popupTimeout = null;

// ============================================================
// UI HELPERS
// ============================================================
function flash(msg) {
  const el = document.getElementById('flash-msg');
  el.textContent = msg;
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
}

function showPopup(id) {
  const el = ELEMENTS[id];
  if (!el) return;
  document.getElementById('popup-icon').innerHTML = renderIcon(id, 36);
  document.getElementById('popup-name').textContent = el.name.toUpperCase();
  const popup = document.getElementById('new-element-popup');
  popup.classList.add('show');
  if (popupTimeout) clearTimeout(popupTimeout);
  popupTimeout = setTimeout(() => popup.classList.remove('show'), 2500);
}

function updateStats() {
  document.getElementById('found-count').textContent = discovered.size;
  document.getElementById('total-count').textContent = Object.keys(ELEMENTS).length;
}

// ============================================================
// SIDEBAR
// ============================================================
const CATEGORIES = ['all','basic','nature','life','human','science','space','myth','food'];

function buildCategoryFilter() {
  const container = document.getElementById('cat-filter');
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === activeCategory ? ' active' : '');
    btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
    btn.onclick = () => {
      activeCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderSidebar();
    };
    container.appendChild(btn);
  });
}

function renderSidebar(highlightId = null) {
  const list = document.getElementById('elements-list');
  list.innerHTML = '';

  const sorted = [...discovered].filter(id => {
    const el = ELEMENTS[id];
    if (!el) return false;
    if (activeCategory !== 'all' && el.cat !== activeCategory) return false;
    if (searchQuery && !el.name.toLowerCase().includes(searchQuery)) return false;
    return true;
  }).sort((a, b) => {
    const ea = ELEMENTS[a], eb = ELEMENTS[b];
    if (ea.tier !== eb.tier) return ea.tier - eb.tier;
    return ea.name.localeCompare(eb.name);
  });

  sorted.forEach(id => {
    const el = ELEMENTS[id];
    const item = document.createElement('div');
    item.className = 'sidebar-item' + (id === highlightId ? ' new-item' : '');
    item.innerHTML = `<div class="el-icon">${renderIcon(id)}</div><div class="el-label">${el.name}</div>`;
    item.onclick = () => spawnElement(id);
    list.appendChild(item);
  });
}

// ============================================================
// CANVAS ELEMENT
// ============================================================
function spawnElement(id, x, y) {
  const ws = document.getElementById('workspace');
  const rect = ws.getBoundingClientRect();
  if (x === undefined) {
    x = 40 + Math.random() * (rect.width - 120);
    y = 40 + Math.random() * (rect.height - 120);
  }

  const uid = ++elementIdCounter;
  const div = document.createElement('div');
  div.className = 'canvas-element spawning';
  div.dataset.uid = uid;
  div.dataset.id = id;
  div.style.left = x + 'px';
  div.style.top = y + 'px';

  const el = ELEMENTS[id];
  div.innerHTML = `<div class="el-icon">${renderIcon(id, 48)}</div><div class="el-label">${el.name}</div>`;
  ws.appendChild(div);

  setTimeout(() => div.classList.remove('spawning'), 400);

  canvasElements.push({ uid, id, div, x, y });

  div.addEventListener('mousedown', e => startDrag(e, uid));
  div.addEventListener('touchstart', e => startDragTouch(e, uid), {passive: false});

  return uid;
}

function removeCanvasElement(uid) {
  const idx = canvasElements.findIndex(e => e.uid === uid);
  if (idx === -1) return;
  const {div} = canvasElements[idx];
  div.classList.add('merging');
  setTimeout(() => div.remove(), 300);
  canvasElements.splice(idx, 1);
}

// ============================================================
// DRAG
// ============================================================
function startDrag(e, uid) {
  e.preventDefault();
  const ce = canvasElements.find(e => e.uid === uid);
  if (!ce) return;
  dragging = uid;
  const rect = ce.div.getBoundingClientRect();
  const wsRect = document.getElementById('workspace').getBoundingClientRect();
  dragOffsetX = e.clientX - rect.left;
  dragOffsetY = e.clientY - rect.top;
  ce.div.classList.add('dragging');
  ce.div.style.zIndex = 100;
}

function startDragTouch(e, uid) {
  e.preventDefault();
  const touch = e.touches[0];
  const ce = canvasElements.find(e => e.uid === uid);
  if (!ce) return;
  dragging = uid;
  const rect = ce.div.getBoundingClientRect();
  dragOffsetX = touch.clientX - rect.left;
  dragOffsetY = touch.clientY - rect.top;
  ce.div.classList.add('dragging');
}

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const ce = canvasElements.find(el => el.uid === dragging);
  if (!ce) return;
  const ws = document.getElementById('workspace');
  const wsRect = ws.getBoundingClientRect();
  let nx = e.clientX - wsRect.left - dragOffsetX;
  let ny = e.clientY - wsRect.top - dragOffsetY;
  nx = Math.max(0, Math.min(wsRect.width - 60, nx));
  ny = Math.max(0, Math.min(wsRect.height - 80, ny));
  ce.x = nx; ce.y = ny;
  ce.div.style.left = nx + 'px';
  ce.div.style.top = ny + 'px';
});

document.addEventListener('touchmove', e => {
  if (!dragging) return;
  e.preventDefault();
  const touch = e.touches[0];
  const ce = canvasElements.find(el => el.uid === dragging);
  if (!ce) return;
  const ws = document.getElementById('workspace');
  const wsRect = ws.getBoundingClientRect();
  let nx = touch.clientX - wsRect.left - dragOffsetX;
  let ny = touch.clientY - wsRect.top - dragOffsetY;
  nx = Math.max(0, Math.min(wsRect.width - 60, nx));
  ny = Math.max(0, Math.min(wsRect.height - 80, ny));
  ce.x = nx; ce.y = ny;
  ce.div.style.left = nx + 'px';
  ce.div.style.top = ny + 'px';
}, {passive: false});

document.addEventListener('mouseup', e => stopDrag());
document.addEventListener('touchend', e => stopDrag());

function stopDrag() {
  if (!dragging) return;
  const ce = canvasElements.find(el => el.uid === dragging);
  if (ce) {
    ce.div.classList.remove('dragging');
    ce.div.style.zIndex = 10;
    checkCollisions(dragging);
  }
  dragging = null;
}

// ============================================================
// COLLISION / MERGING
// ============================================================
function checkCollisions(uid) {
  const a = canvasElements.find(e => e.uid === uid);
  if (!a) return;

  for (const b of canvasElements) {
    if (b.uid === uid) continue;
    const dx = (a.x + 24) - (b.x + 24);
    const dy = (a.y + 28) - (b.y + 28);
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 52) {
      tryMerge(a, b);
      return;
    }
  }
}

function tryMerge(a, b) {
  const key = a.id < b.id ? `${a.id}+${b.id}` : `${b.id}+${a.id}`;
  const result = comboMap[key];
  const ax = (a.x + b.x) / 2;
  const ay = (a.y + b.y) / 2;

  removeCanvasElement(a.uid);
  removeCanvasElement(b.uid);

  if (result && ELEMENTS[result]) {
    const isNew = !discovered.has(result);
    discovered.add(result);

    setTimeout(() => {
      spawnElement(result, ax, ay);
      if (isNew) {
        flash(`✨ ${ELEMENTS[result].name.toUpperCase()} DISCOVERED!`);
        showPopup(result);
        renderSidebar(result);
        updateStats();
      } else {
        flash(`⚗ ${ELEMENTS[result].name}`);
      }
    }, 150);
  } else {
    // No combination — bounce back
    setTimeout(() => {
      spawnElement(a.id, a.x - 30, a.y);
      spawnElement(b.id, b.x + 30, b.y);
    }, 150);
  }
}

  searchQuery = e.target.value.toLowerCase().trim();
  renderSidebar();

document.getElementById('clear-btn').onclick = () => {
  [...canvasElements].forEach(ce => {
    ce.div.remove();
  });
  canvasElements = [];
};

  spawnElement('air',   w*0.5, h*0.6);
